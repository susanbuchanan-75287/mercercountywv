<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" role="img" aria-label="Illustration of the Almost Heaven swing at East River Mountain Overlook, facing layered Appalachian ridgelines at sunset">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#061426"/>
      <stop offset="0.42" stop-color="#0c2a4d"/>
      <stop offset="0.68" stop-color="#3f4f6b"/>
      <stop offset="0.84" stop-color="#c8792a"/>
      <stop offset="1" stop-color="#f0b429"/>
    </linearGradient>
    <radialGradient id="sun" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#fff3d6"/>
      <stop offset="0.5" stop-color="#f0b429"/>
      <stop offset="1" stop-color="#f0b429" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="r1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#2a6f66"/><stop offset="1" stop-color="#1f5a54"/>
    </linearGradient>
    <linearGradient id="r2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#183f63"/><stop offset="1" stop-color="#122f4a"/>
    </linearGradient>
  </defs>

  <rect width="800" height="600" fill="url(#sky)"/>

  <g fill="#f6f1e7" opacity="0.85">
    <circle cx="90" cy="70" r="2"/><circle cx="180" cy="130" r="1.5"/><circle cx="300" cy="60" r="1.8"/>
    <circle cx="470" cy="90" r="1.5"/><circle cx="620" cy="55" r="2"/><circle cx="710" cy="120" r="1.5"/>
    <circle cx="130" cy="200" r="1.3"/><circle cx="560" cy="160" r="1.3"/>
  </g>

  <circle cx="300" cy="360" r="150" fill="url(#sun)"/>
  <circle cx="300" cy="360" r="52" fill="#fff3d6"/>

  <path d="M0,360 L120,320 L260,352 L420,312 L600,350 L760,318 L800,338 L800,600 L0,600 Z" fill="url(#r1)" opacity="0.55"/>
  <path d="M0,400 L160,352 L340,392 L520,344 L700,392 L800,364 L800,600 L0,600 Z" fill="url(#r2)" opacity="0.8"/>
  <path d="M0,452 L200,404 L400,448 L620,398 L800,446 L800,600 L0,600 Z" fill="#0b2038"/>

  <path d="M0,520 Q400,486 800,520 L800,600 L0,600 Z" fill="#041427"/>

  <g fill="#020b16" stroke="#020b16" stroke-linejoin="round">
    <polygon points="300,206 246,522 268,522 316,214"/>
    <polygon points="336,206 384,522 406,522 356,214"/>
    <polygon points="612,206 558,522 580,522 628,214"/>
    <polygon points="648,206 696,522 718,522 668,214"/>
    <rect x="286" y="196" width="376" height="22" rx="6"/>
    <rect x="392" y="216" width="5" height="196"/>
    <rect x="551" y="216" width="5" height="196"/>
    <rect x="360" y="408" width="228" height="16" rx="6"/>
    <rect x="360" y="352" width="16" height="64" rx="5"/>
    <rect x="572" y="352" width="16" height="64" rx="5"/>
    <rect x="360" y="352" width="228" height="14" rx="6"/>
    <rect x="360" y="380" width="228" height="9" rx="4"/>
  </g>

  <text x="474" y="188" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif"
        font-size="26" letter-spacing="4" fill="#f0b429" font-weight="700">ALMOST HEAVEN</text>

  <rect x="4" y="4" width="792" height="592" fill="none" stroke="#f6f1e7" stroke-opacity="0.12" stroke-width="8" rx="18"/>
</svg>
